name = "backend"
main = "src/index.ts"
compatibility_date = "2026-06-27"
# Required by the AI SDK (ai / @ai-sdk/*) which pulls in node: builtins.
compatibility_flags = ["nodejs_compat"]

[vars]
TURSO_DATABASE_URL = ""
# Secrets — set via `wrangler secret put <NAME>`:
#   TURSO_AUTH_TOKEN, LLM_API_KEY, TAVILY_API_KEY
# Non-secret config (set here or as secrets):
#   LLM_MODEL, LLM_BASE_URL (optional), CORS_ORIGIN (exact frontend origin)
